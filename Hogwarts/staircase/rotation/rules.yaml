# rotation/rules.yaml
# The λ (lambda function): Maps (Engagement State × Signal) → Active Landing
# Output = λ × Input, where Input is the state/signal context and Output is the rotation result.

rules:
  # Example: When probing in a stable environment, encourage routine building
  - id: rule-routine-probing
    description: "When probing in a stable environment, direct towards routines."
    input:
      engagement: "probing"
      signal: "orbit_stable"
    lambda: "match_all"
    output:
      active_landing: "routines"

  # Example: When integrated but turbulence is detected, force deviation analysis
  - id: rule-force-deviation
    description: "If executing code but turbulence is detected, force a rotation to patterns/deviation."
    input:
      engagement: "integrated"
      signal: "turbulence_detected"
    lambda: "match_any" # 'any' matching condition triggers the override
    output:
      active_landing: "patterns/deviation"
      override: true

  # Example: Arkhipov hold always points to governance until gate opens
  - id: rule-arkhipov-governance
    description: "If in an Arkhipov hold, only governance can be accessed."
    input:
      engagement: "arkhipov_hold"
      signal: "*"
    lambda: "match_all"
    output:
      active_landing: "governors"

  # Example: Canon drift during synthesis requires library update
  - id: rule-canon-reconciliation
    description: "If drifting from canon while synthesizing, force library reconciliation."
    input:
      engagement: "graduation"
      signal: "canon_drift"
    lambda: "match_all"
    output:
      active_landing: "library"

  # Example: Graduation in stable orbit → design for character/brand work
  - id: rule-design-character
    description: "If synthesizing knowledge in a stable environment, direct to character and brand design."
    input:
      engagement: "graduation"
      signal: "orbit_stable"
    lambda: "match_all"
    output:
      active_landing: "design"

# rotation/signals.yaml
# Models the external state of the workspace (the environment).
# Based on interface definitions from output-0.3.0- (e.g., MissionStatus, PulseItem)

signals:
  - id: orbit_stable
    title: "Orbit Stable"
    description: "Green builds, clean linting, steady state. No immediate crises."
    metadata:
      mission_status: "orbit_stable"
      risk_level: "low"
      coherence_score: 95

  - id: turbulence_detected
    title: "Turbulence Detected"
    description: "High frequency of test failures, linter errors, or integration friction."
    metadata:
      mission_status: "turbulence_detected"
      risk_level: "high"
      coherence_score: 40

  - id: canon_drift
    title: "Canon Drift"
    description: "Discrepancy detected between active code and established documentation or rules."
    metadata:
      mission_status: "investigating"
      risk_level: "medium"
      coherence_score: 70

  - id: gate_open
    title: "Gate Open"
    description: "A manual user approval or gated-execution phase transition has occurred."
    metadata:
      mission_status: "transitioning"
      risk_level: "low"
      coherence_score: 90

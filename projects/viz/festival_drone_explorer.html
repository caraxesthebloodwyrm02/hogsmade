<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festival Drone Explorer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1e;
      color: #e0e0e0;
      padding: 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }
    
    .subtitle {
      text-align: center;
      color: #999;
      margin-bottom: 24px;
      font-size: 14px;
    }
    
    #canvas {
      display: block;
      width: 100%;
      height: auto;
      background: linear-gradient(180deg, #0a0e27 0%, #1a1a3e 50%, #2d1b4e 100%);
      border-radius: 8px;
      margin-bottom: 24px;
    }
    
    .control-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .control-label {
      font-size: 12px;
      font-weight: 500;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .control-value {
      font-size: 16px;
      font-weight: 600;
      color: #00ff88;
    }
    
    input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00ffff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
    }
    
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00ffff;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
    }
    
    .info-bar {
      display: flex;
      gap: 24px;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-size: 13px;
      color: #999;
      flex-wrap: wrap;
    }
    
    .info-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .info-item::before {
      content: '✦';
      color: #ff00ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Festival Drone Explorer</h1>
    <p class="subtitle">Real-time aerial visualization from stage perspective</p>
    
    <canvas id="canvas"></canvas>
    
    <div class="control-panel">
      <div class="control-group">
        <label class="control-label">Drone altitude</label>
        <input type="range" id="altitude" min="0" max="100" value="50">
        <span class="control-value" id="altValue">500m</span>
      </div>
      <div class="control-group">
        <label class="control-label">Perspective angle</label>
        <input type="range" id="angle" min="0" max="360" value="0">
        <span class="control-value" id="angleValue">0°</span>
      </div>
      <div class="control-group">
        <label class="control-label">Light intensity</label>
        <input type="range" id="lights" min="0" max="100" value="75">
        <span class="control-value" id="lightsValue">75%</span>
      </div>
      <div class="control-group">
        <label class="control-label">Fireworks intensity</label>
        <input type="range" id="fireworks" min="0" max="100" value="60">
        <span class="control-value" id="fireworksValue">60%</span>
      </div>
    </div>
    
    <div class="info-bar">
      <div class="info-item">Live from stage</div>
      <div class="info-item">Drone feed active</div>
      <div class="info-item" id="crowdSize">Crowd: 50k+</div>
    </div>
  </div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const altSlider = document.getElementById('altitude');
    const angleSlider = document.getElementById('angle');
    const lightsSlider = document.getElementById('lights');
    const fireworksSlider = document.getElementById('fireworks');
    
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = 500;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    let particles = [];
    let time = 0;
    
    class Particle {
      constructor(x, y, vx, vy, life = 2) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.life = life;
        this.maxLife = life;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.1;
        this.life -= 0.02;
      }
      draw(ctx, intensity) {
        const alpha = Math.max(0, this.life / this.maxLife) * (intensity / 100);
        ctx.globalAlpha = alpha;
        const colors = ['#ff00ff', '#00ffff', '#ffff00', '#ff6600', '#ff0066'];
        ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
        ctx.fillRect(this.x - 2, this.y - 2, 4, 4);
        ctx.globalAlpha = 1;
      }
    }
    
    function createFireworks(intensity) {
      if (Math.random() < (intensity / 100) * 0.03) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height * 0.4;
        const count = Math.floor(20 + intensity / 5);
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 * i) / count;
          const speed = 3 + Math.random() * 4;
          particles.push(new Particle(
            x, y,
            Math.cos(angle) * speed,
            Math.sin(angle) * speed,
            2 + Math.random()
          ));
        }
      }
    }
    
    function drawStage(x, y, scale, opacity, angle) {
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.translate(x, y);
      ctx.rotate((angle * Math.PI) / 180);
      
      const scl = scale;
      
      ctx.fillStyle = '#1a0033';
      ctx.fillRect(-120 * scl, -60 * scl, 240 * scl, 120 * scl);
      
      ctx.fillStyle = '#00ffff';
      ctx.fillRect(-100 * scl, -50 * scl, 200 * scl, 30 * scl);
      
      ctx.fillStyle = '#ff00ff';
      for (let i = 0; i < 5; i++) {
        const sx = -100 * scl + (i * 50 * scl);
        ctx.fillRect(sx, -60 * scl, 15 * scl, 20 * scl);
      }
      
      ctx.strokeStyle = '#00ff00';
      ctx.lineWidth = 2;
      ctx.strokeRect(-120 * scl, -60 * scl, 240 * scl, 120 * scl);
      
      ctx.restore();
    }
    
    function drawCrowd(x, y, scale, opacity, angle) {
      ctx.save();
      ctx.globalAlpha = opacity * 0.6;
      ctx.translate(x, y);
      ctx.rotate((angle * Math.PI) / 180);
      
      ctx.fillStyle = '#ff66cc';
      for (let i = 0; i < 8; i++) {
        for (let j = 0; j < 12; j++) {
          const px = -140 + j * 30;
          const py = 80 + i * 20;
          const size = 4 + Math.sin(time * 0.05 + i + j) * 2;
          ctx.fillRect(px, py, size, size);
        }
      }
      
      ctx.restore();
    }
    
    function drawBeams(x, y, scale, opacity, intensity, angle) {
      ctx.save();
      ctx.globalAlpha = opacity * (intensity / 100);
      ctx.translate(x, y);
      ctx.rotate((angle * Math.PI) / 180);
      
      const colors = ['#ff0000', '#00ffff', '#ff00ff', '#00ff00'];
      for (let i = 0; i < 4; i++) {
        ctx.strokeStyle = colors[i];
        ctx.lineWidth = 3;
        ctx.globalAlpha = Math.sin(time * 0.02 + i) * 0.5 + 0.5;
        ctx.beginPath();
        ctx.moveTo(-60 + i * 40, 0);
        ctx.lineTo(Math.sin(time * 0.03 + i) * 100, 400);
        ctx.stroke();
      }
      
      ctx.restore();
    }
    
    function animate() {
      const altitude = parseInt(altSlider.value);
      const angle = parseInt(angleSlider.value);
      const lights = parseInt(lightsSlider.value);
      const fireworksIntensity = parseInt(fireworksSlider.value);
      
      document.getElementById('altValue').textContent = (300 + altitude * 2) + 'm';
      document.getElementById('angleValue').textContent = angle + '°';
      document.getElementById('lightsValue').textContent = lights + '%';
      document.getElementById('fireworksValue').textContent = fireworksIntensity + '%';
      
      time++;
      createFireworks(fireworksIntensity);
      
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#0a0e27');
      gradient.addColorStop(0.3, '#1a1a3e');
      gradient.addColorStop(1, '#2d1b4e');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      const centerX = canvas.width / 2;
      const centerY = canvas.height * 0.6;
      
      const altScale = 0.3 + (altitude / 100) * 0.7;
      const altOpacity = 1 - altitude / 200;
      
      drawCrowd(centerX, centerY + 80, altScale * 0.8, altOpacity, angle);
      drawBeams(centerX, centerY - 40, 1, lights, lights, angle);
      drawStage(centerX, centerY, altScale, altOpacity, angle);
      
      particles.forEach((p, i) => {
        p.update();
        p.draw(ctx, fireworksIntensity);
        if (p.life <= 0) particles.splice(i, 1);
      });
      
      ctx.globalAlpha = 1;
      
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body>
</html>

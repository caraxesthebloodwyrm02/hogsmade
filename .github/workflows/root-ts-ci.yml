name: root-ts-ci

on:
  push:
    branches: ["**"]
    paths:
      - "Components/shared-types/**"
      - "Components/shared-resilience/**"
      - "Components/shared-pipeline/**"
      - "Tools/MCPServers/eligibility-server/**"
      - "Tools/MCPServers/afloat-server/**"
      - "Tools/MCPServers/echoes-server/**"
      - "Tools/MCPServers/grid-server/**"
      - "Tools/MCPServers/glimpse-server/**"
      - "Tools/MCPServers/lots-server/**"
      - "Tools/MCPServers/maintain-server/**"
      - "Tools/MCPServers/mangrove-server/**"
      - "Tools/MCPServers/overview-server/**"
      - "Tools/MCPServers/pulse-server/**"
      - "Tools/MCPServers/seeds-server/**"
      - "Applications/glimpse-artifact/**"
      - "Applications/glimpse-engine/**"
      - "glimpse.master.yaml"
      - "sample-innovations.json"
      - "sample-scenario.json"
      - "sample-cross-context-demo.json"
      - "Components/tests/**"
      - "Components/scripts/bootstrap_glimpse_logic.mjs"
      - "Components/scripts/run_repo_contract_checks.sh"
      - ".github/repo-contract.json"
      - ".github/workflows/root-ts-ci.yml"
  pull_request:
    paths:
      - "Components/shared-types/**"
      - "Components/shared-resilience/**"
      - "Components/shared-pipeline/**"
      - "Tools/MCPServers/eligibility-server/**"
      - "Tools/MCPServers/afloat-server/**"
      - "Tools/MCPServers/echoes-server/**"
      - "Tools/MCPServers/grid-server/**"
      - "Tools/MCPServers/glimpse-server/**"
      - "Tools/MCPServers/lots-server/**"
      - "Tools/MCPServers/maintain-server/**"
      - "Tools/MCPServers/mangrove-server/**"
      - "Tools/MCPServers/overview-server/**"
      - "Tools/MCPServers/pulse-server/**"
      - "Tools/MCPServers/seeds-server/**"
      - "Applications/glimpse-artifact/**"
      - "Applications/glimpse-engine/**"
      - "glimpse.master.yaml"
      - "sample-innovations.json"
      - "sample-scenario.json"
      - "sample-cross-context-demo.json"
      - "Components/tests/**"
      - "Components/scripts/bootstrap_glimpse_logic.mjs"
      - "Components/scripts/run_repo_contract_checks.sh"
      - ".github/repo-contract.json"
      - ".github/workflows/root-ts-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: root-ts-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: root-ts-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            Components/shared-types/package-lock.json
            Components/shared-resilience/package-lock.json
            Components/shared-pipeline/package-lock.json
            Tools/MCPServers/eligibility-server/package-lock.json
            Tools/MCPServers/afloat-server/package-lock.json
            Tools/MCPServers/echoes-server/package-lock.json
            Tools/MCPServers/grid-server/package-lock.json
            Tools/MCPServers/lots-server/package-lock.json
            Tools/MCPServers/maintain-server/package-lock.json
            Tools/MCPServers/pulse-server/package-lock.json
            Tools/MCPServers/seeds-server/package-lock.json
            Applications/glimpse-artifact/package-lock.json
            Tools/MCPServers/glimpse-server/package-lock.json
            Tools/MCPServers/mangrove-server/package-lock.json
            Tools/MCPServers/overview-server/package-lock.json
            Applications/glimpse-engine/package-lock.json

      - name: Run trusted repo checks
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: bash Components/scripts/run_repo_contract_checks.sh

name: Root TypeScript CI

on:
  push:
    branches: ['**']
    paths:
      - '.github/workflows/root-typescript-ci.yml'
      - 'shared-types/**'
      - 'shared-resilience/**'
      - 'shared-pipeline/**'
      - 'eligibility-server/**'
      - 'afloat-server/**'
      - 'echoes-server/**'
      - 'grid-server/**'
      - 'glimpse-server/**'
      - 'lots-server/**'
      - 'maintain-server/**'
      - 'mangrove-server/**'
      - 'overview-server/**'
      - 'pulse-server/**'
      - 'seeds-server/**'
      - 'glimpse-artifact/**'
      - 'glimpse-engine/**'
      - 'tests/glimpse-engine.test.mjs'
      - 'scripts/bootstrap_glimpse_logic.mjs'
      - 'glimpse.master.yaml'
      - 'sample-innovations.json'
      - 'sample-scenario.json'
      - 'sample-cross-context-demo.json'
  pull_request:
    paths:
      - '.github/workflows/root-typescript-ci.yml'
      - 'shared-types/**'
      - 'shared-resilience/**'
      - 'shared-pipeline/**'
      - 'eligibility-server/**'
      - 'afloat-server/**'
      - 'echoes-server/**'
      - 'grid-server/**'
      - 'glimpse-server/**'
      - 'lots-server/**'
      - 'maintain-server/**'
      - 'mangrove-server/**'
      - 'overview-server/**'
      - 'pulse-server/**'
      - 'seeds-server/**'
      - 'glimpse-artifact/**'
      - 'glimpse-engine/**'
      - 'tests/glimpse-engine.test.mjs'
      - 'scripts/bootstrap_glimpse_logic.mjs'
      - 'glimpse.master.yaml'
      - 'sample-innovations.json'
      - 'sample-scenario.json'
      - 'sample-cross-context-demo.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: root-typescript-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Shared packages (build once, every server job rebuilds from checkout) ──
  shared-types:
    name: Shared Types Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: shared-types/package-lock.json

      - run: npm ci -w shared-types
      - run: npm run build -w shared-types

  # ── MCP servers (matrix) ───────────────────────────────────────────────────
  servers:
    name: Server Build & Test (${{ matrix.project }})
    needs: shared-types
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - afloat-server
          - echoes-server
          - eligibility-server
          - glimpse-server
          - grid-server
          - lots-server
          - maintain-server
          - mangrove-server
          - overview-server
          - pulse-server
          - seeds-server
        include:
          # grid-server needs shared-resilience
          - project: grid-server
            needs_resilience: true
          # eligibility-server needs shared-pipeline
          - project: eligibility-server
            needs_pipeline: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            shared-types/package-lock.json
            ${{ matrix.project }}/package-lock.json

      - name: Build shared-types
        run: npm ci -w shared-types && npm run build -w shared-types

      - name: Build shared-resilience
        if: matrix.needs_resilience
        run: npm ci -w shared-resilience && npm run build -w shared-resilience

      - name: Build shared-pipeline
        if: matrix.needs_pipeline
        run: npm ci -w shared-pipeline && npm run build -w shared-pipeline

      - name: Build server
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: npm ci -w ${{ matrix.project }} && npm run build -w ${{ matrix.project }}

      - name: Test server
        run: npm test -w ${{ matrix.project }}

  # ── Glimpse Artifact (React component library) ────────────────────────────
  glimpse-artifact:
    name: Glimpse Artifact Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            shared-types/package-lock.json
            shared-pipeline/package-lock.json
            eligibility-server/package-lock.json
            glimpse-artifact/package-lock.json

      - name: Build shared-types
        run: npm ci -w shared-types && npm run build -w shared-types

      - name: Build shared-pipeline
        run: npm ci -w shared-pipeline && npm run build -w shared-pipeline

      - name: Build eligibility-server
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: npm ci -w eligibility-server && npm run build -w eligibility-server

      - name: Check
        run: npm ci -w glimpse-artifact && npm run check -w glimpse-artifact

  # ── Glimpse Engine (browser visualization) ────────────────────────────────
  glimpse-engine:
    name: Glimpse Engine Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: glimpse-engine/package-lock.json

      - name: Install deps
        run: npm ci -w glimpse-engine

      - name: Run tests
        run: node --test tests/glimpse-engine.test.mjs

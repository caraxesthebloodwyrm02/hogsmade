name: Root TypeScript CI

on:
  push:
    branches: ['**']
    paths:
      - '.github/workflows/root-typescript-ci.yml'
      - 'glimpse-artifact/**'
      - 'shared-types/**'
      - 'afloat-server/**'
      - 'echoes-server/**'
      - 'grid-server/**'
      - 'lots-server/**'
      - 'maintain-server/**'
      - 'pulse-server/**'
      - 'seeds-server/**'
      - 'glimpse-engine/**'
      - 'tests/glimpse-engine.test.mjs'
      - 'scripts/bootstrap_glimpse_logic.mjs'
      - 'glimpse.master.yaml'
      - 'sample-innovations.json'
      - 'sample-scenario.json'
      - 'sample-cross-context-demo.json'
  pull_request:
    paths:
      - '.github/workflows/root-typescript-ci.yml'
      - 'glimpse-artifact/**'
      - 'shared-types/**'
      - 'afloat-server/**'
      - 'echoes-server/**'
      - 'grid-server/**'
      - 'lots-server/**'
      - 'maintain-server/**'
      - 'pulse-server/**'
      - 'seeds-server/**'
      - 'glimpse-engine/**'
      - 'tests/glimpse-engine.test.mjs'
      - 'scripts/bootstrap_glimpse_logic.mjs'
      - 'glimpse.master.yaml'
      - 'sample-innovations.json'
      - 'sample-scenario.json'
      - 'sample-cross-context-demo.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: root-typescript-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared-types:
    name: Shared Types Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: shared-types/package-lock.json

      - name: Install dependencies
        run: npm ci -w shared-types

      - name: Build
        run: npm run build -w shared-types

  servers:
    name: Server Build & Test (${{ matrix.project }})
    needs: shared-types
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - afloat-server
          - echoes-server
          - grid-server
          - lots-server
          - maintain-server
          - overview-server
          - pulse-server
          - seeds-server
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            shared-types/package-lock.json
            shared-resilience/package-lock.json
            ${{ matrix.project }}/package-lock.json

      - name: Install shared-types dependencies
        run: npm ci -w shared-types

      - name: Build shared-types
        run: npm run build -w shared-types

      - name: Install shared-resilience dependencies
        run: npm ci -w shared-resilience

      - name: Build shared-resilience
        run: npm run build -w shared-resilience

      - name: Install server dependencies
        run: npm ci -w ${{ matrix.project }}

      - name: Build server
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: npm run build -w ${{ matrix.project }}

      - name: Test server
        run: npm test -w ${{ matrix.project }}

  glimpse-artifact:
    name: Glimpse Artifact Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            shared-types/package-lock.json
            shared-pipeline/package-lock.json
            eligibility-server/package-lock.json
            glimpse-artifact/package-lock.json

      - name: Install and build shared-types
        run: npm ci -w shared-types && npm run build -w shared-types

      - name: Install and build shared-pipeline
        run: npm ci -w shared-pipeline && npm run build -w shared-pipeline

      - name: Install and build eligibility-server
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: npm ci -w eligibility-server && npm run build -w eligibility-server

      - name: Install glimpse-artifact dependencies
        run: npm ci -w glimpse-artifact

      - name: Check
        run: npm run check -w glimpse-artifact

  glimpse-engine:
    name: Glimpse Engine Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            glimpse-artifact/package-lock.json
            glimpse-engine/package-lock.json

      - name: Install glimpse-artifact deps
        run: npm ci -w glimpse-artifact

      - name: Install glimpse-engine deps
        run: npm ci -w glimpse-engine

      - name: Run root Glimpse tests
        run: node --test tests/glimpse-engine.test.mjs

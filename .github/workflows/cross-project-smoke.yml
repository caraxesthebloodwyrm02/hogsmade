name: Cross-Project Smoke Test

on:
  schedule:
    - cron: "0 10 * * 1" # Every Monday at 10:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typescript-build:
    name: TypeScript Build Chain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install monorepo
        run: npm ci

      - name: Build shared-types
        run: npm run build -w @cascade/shared-types

      - name: Build shared-resilience
        run: npm run build -w @cascade/shared-resilience

      - name: Build shared-pipeline
        run: npm run build -w @cascade/shared-pipeline

      - name: Build eligibility-server
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npm run build -w eligibility-server

      - name: Build MCP servers
        run: |
          FAILED=0
          for dir in afloat-server echoes-server grid-server lots-server maintain-server overview-server pulse-server seeds-server; do
            echo "== ${dir} =="
            npm run build -w "$dir" || {
              echo "::error::Build failed for ${dir}"
              FAILED=$((FAILED + 1))
            }
          done

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::${FAILED} server(s) failed to build"
            exit 1
          fi

      - name: Build glimpse-artifact
        run: npm run build -w glimpse-artifact

  test-servers:
    name: Test MCP Servers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typescript-build]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install monorepo
        run: npm ci

      - name: Build shared-types
        run: npm run build -w @cascade/shared-types

      - name: Build shared-resilience
        run: npm run build -w @cascade/shared-resilience

      - name: Build shared-pipeline
        run: npm run build -w @cascade/shared-pipeline

      - name: Build eligibility-server
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npm run build -w eligibility-server

      - name: Test MCP servers
        run: |
          FAILED=0
          for dir in afloat-server echoes-server grid-server lots-server maintain-server overview-server pulse-server seeds-server; do
            echo "== ${dir} =="
            npm test -w "$dir" || {
              echo "::warning::Tests failed for ${dir}"
              FAILED=$((FAILED + 1))
            }
          done

          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::${FAILED} server(s) had test failures"
          fi

  summary:
    name: Smoke Test Summary
    runs-on: ubuntu-latest
    needs: [typescript-build, test-servers]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Generate summary
        run: |
          echo "## Cross-Project Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript Build Chain | ${{ needs.typescript-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Server Tests | ${{ needs.test-servers.result }} |" >> $GITHUB_STEP_SUMMARY

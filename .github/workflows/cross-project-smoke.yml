name: Cross-Project Smoke Test

on:
  schedule:
    - cron: "0 10 * * 1"  # Every Monday at 10:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typescript-build:
    name: TypeScript Build Chain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build shared-types
        run: |
          cd shared-types
          npm ci
          npm run build

      - name: Build shared-resilience
        run: |
          cd shared-resilience
          npm ci
          npm run build

      - name: Build shared-pipeline
        run: |
          cd shared-pipeline
          npm ci
          npm run build

      - name: Build eligibility-server
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: |
          cd eligibility-server
          npm ci
          npm run build

      - name: Build MCP servers
        run: |
          FAILED=0
          for dir in afloat-server echoes-server glimpse-server grid-server lots-server maintain-server mangrove-server overview-server pulse-server seeds-server; do
            echo "== ${dir} =="
            (
              cd "$dir"
              npm ci
              npm run build
            ) || {
              echo "::error::Build failed for ${dir}"
              FAILED=$((FAILED + 1))
            }
          done

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::${FAILED} server(s) failed to build"
            exit 1
          fi

      - name: Build glimpse-artifact
        run: |
          cd glimpse-artifact
          npm ci
          npm run build

  test-servers:
    name: Test MCP Servers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typescript-build]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build shared-types
        run: |
          cd shared-types
          npm ci
          npm run build

      - name: Build shared-resilience
        run: |
          cd shared-resilience
          npm ci
          npm run build

      - name: Build shared-pipeline
        run: |
          cd shared-pipeline
          npm ci
          npm run build

      - name: Build eligibility-server
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: |
          cd eligibility-server
          npm ci
          npm run build

      - name: Test MCP servers
        run: |
          FAILED=0
          for dir in afloat-server echoes-server glimpse-server grid-server lots-server maintain-server mangrove-server overview-server pulse-server seeds-server; do
            echo "== ${dir} =="
            (
              cd "$dir"
              npm ci
              npm test
            ) || {
              echo "::warning::Tests failed for ${dir}"
              FAILED=$((FAILED + 1))
            }
          done

          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::${FAILED} server(s) had test failures"
          fi

  summary:
    name: Smoke Test Summary
    runs-on: ubuntu-latest
    needs: [typescript-build, test-servers]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Generate summary
        run: |
          echo "## Cross-Project Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript Build Chain | ${{ needs.typescript-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Server Tests | ${{ needs.test-servers.result }} |" >> $GITHUB_STEP_SUMMARY

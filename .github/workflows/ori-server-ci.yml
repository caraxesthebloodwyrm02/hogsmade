# Persistent automation for ori-server: build + test on code changes and weekly heartbeat.
name: ori-server

on:
  push:
    paths:
      - "Tools/MCPServers/ori-server/**"
      - ".github/workflows/ori-server-ci.yml"
  pull_request:
    paths:
      - "Tools/MCPServers/ori-server/**"
      - ".github/workflows/ori-server-ci.yml"
  schedule:
    # Monday 06:00 UTC — keeps toolchain + registry-related tests in muscle memory
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ori-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    # Default is ~/CascadeProjects — CI checkout lives at $GITHUB_WORKSPACE (hogsmade root).
    env:
      CASCADE_WORKSPACE_ROOT: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Tools/MCPServers/ori-server/package.json

      # @cascade/shared-types is a file: dependency; ori-server resolves ./dist exports — build it first.
      - name: Install and build shared-types
        working-directory: Components/shared-types
        run: |
          npm install
          npm run build

      - name: Install (ori-server)
        working-directory: Tools/MCPServers/ori-server
        run: npm install

      - name: Build (ori-server)
        working-directory: Tools/MCPServers/ori-server
        run: npm run build

      - name: Test (ori-server)
        working-directory: Tools/MCPServers/ori-server
        run: npm test

      - name: GRUFF snapshot (dated SVG artifact)
        working-directory: Tools/MCPServers/ori-server
        env:
          ORI_DATA_DIR: ${{ github.workspace }}/.ori-ci
        run: npm run gruff-ci-snapshot

      - name: Upload GRUFF SVG
        uses: actions/upload-artifact@v4
        with:
          name: gruff-ci-snapshot
          path: .ori-ci/reports/*-ci-gruff.svg
          if-no-files-found: error

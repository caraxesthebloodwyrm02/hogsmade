name: verify-mcp-inventory

on:
  push:
    branches: ["**"]
    paths:
      - "mcp_config.json"
      - "mcp_inventory.manifest.json"
      - "scripts/verify_mcp_inventory.py"
      - ".github/workflows/verify-mcp-inventory.yml"
  pull_request:
    paths:
      - "mcp_config.json"
      - "mcp_inventory.manifest.json"
      - "scripts/verify_mcp_inventory.py"
      - ".github/workflows/verify-mcp-inventory.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: MCP inventory vs canonical config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest alignment
        run: python3 scripts/verify_mcp_inventory.py --cascade-root "${GITHUB_WORKSPACE}"

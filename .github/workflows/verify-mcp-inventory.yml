name: verify-mcp-inventory

on:
  push:
    branches: ["**"]
    paths:
      - "mcp_config.json"
      - "mcp_config.example.json"
      - "mcp_inventory.manifest.json"
      - "package.json"
      - "Components/scripts/verify_mcp_inventory.py"
      - ".github/workflows/verify-mcp-inventory.yml"
      - "Tools/MCPServers/**/package.json"
  pull_request:
    paths:
      - "mcp_config.json"
      - "mcp_config.example.json"
      - "mcp_inventory.manifest.json"
      - "package.json"
      - "Components/scripts/verify_mcp_inventory.py"
      - ".github/workflows/verify-mcp-inventory.yml"
      - "Tools/MCPServers/**/package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: MCP inventory vs canonical config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify manifest alignment
        run: python3 Components/scripts/verify_mcp_inventory.py --cascade-root "${GITHUB_WORKSPACE}"

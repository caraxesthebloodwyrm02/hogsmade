name: Secrets & Credential Gate

# ─────────────────────────────────────────────────────────────────────────────
# Triggers on every push and PR across all branches.
# This is the pattern-repetition routine: a deterministic scan that either
# finds a forbidden pattern or it doesn't. No judgment call — hard fail.
# Aligns with GATE contract never-rules: "never store user_secret in any file —
# read from Windows Credential Manager only."
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  secrets-scan:
    name: Credential Hygiene Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false

      # ── TruffleHog: scans for verified secrets in diff ───────────────────
      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@v3.95.2
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || format('{0}~1', github.sha) }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified --exclude-paths .trufflehog-exclude-paths.txt

      # ── Custom checks against workspace-specific patterns ────────────────
      - name: Workspace credential hygiene check
        run: |
          set -e
          FAIL=0

          echo "=== Checking for tracked .env files ==="
          # Detect any .env* file that is tracked by git (not .env.example)
          TRACKED_ENV=$(git ls-files | grep -E '^\.env(\.[^e]|$)' || true)
          if [ -n "$TRACKED_ENV" ]; then
            echo "::error::Tracked .env file detected: $TRACKED_ENV"
            echo "  These must be in .gitignore. Add them immediately."
            FAIL=1
          fi

          echo "=== Checking diff for user_secret assignment ==="
          # Detect user_secret = <value> in any new/modified line outside of credential manager reference
          DIFF_BASE=${{ github.event.pull_request.base.sha || format('{0}~1', github.sha) }}
          DIFF_HEAD=${{ github.event.pull_request.head.sha || github.sha }}

          SECRET_MATCHES=$(git diff "$DIFF_BASE" "$DIFF_HEAD" \
            | grep '^+' \
            | grep -v '^+++' \
            | grep -iE 'user_secret\s*[=:]\s*["\047][^"\047]{4,}' \
            | grep -v 'CredentialManager\|os\.environ\|Credential Manager\|PLACEHOLDER\|EXAMPLE\|YOUR_' \
            || true)
          if [ -n "$SECRET_MATCHES" ]; then
            echo "::error::Possible user_secret literal detected in diff:"
            echo "$SECRET_MATCHES"
            echo "  Secrets must be read from Windows Credential Manager only (GATE contract, never-rules)."
            FAIL=1
          fi

          echo "=== Checking for HMAC/signing key literals ==="
          HMAC_MATCHES=$(git diff "$DIFF_BASE" "$DIFF_HEAD" \
            | grep '^+' \
            | grep -v '^+++' \
            | grep -iE '(hmac_key|signing_key|secret_key|api_key)\s*[=:]\s*["\047][a-zA-Z0-9+/]{16,}' \
            | grep -v 'os\.environ\|os\.getenv\|PLACEHOLDER\|EXAMPLE\|test_\|dummy_' \
            || true)
          if [ -n "$HMAC_MATCHES" ]; then
            echo "::error::Possible HMAC/signing key literal in diff:"
            echo "$HMAC_MATCHES"
            FAIL=1
          fi

          echo "=== Checking mcp_config.json and claude_code_config.json for secrets ==="
          for CONFIG_FILE in mcp_config.json claude_code_config.json; do
            if [ -f "$CONFIG_FILE" ]; then
              # These files must not contain any token/key/secret values
              if python3 -c "
          import json, sys, re
          d = open('$CONFIG_FILE').read()
          hits = re.findall(r'\"(?:token|secret|key|password|credential)\"\\s*:\\s*\"([^\"]{8,})\"', d, re.I)
          hits = [h for h in hits if not re.match(r'(?i)(placeholder|example|your_|<|env\.|os\.)', h)]
          if hits:
              print(f'Secret-like value in $CONFIG_FILE: {hits}')
              sys.exit(1)
              "; then
                true
              else
                echo "::error::Secret value detected in $CONFIG_FILE. Use env var references only."
                FAIL=1
              fi
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "Credential hygiene gate FAILED. See errors above."
            exit 1
          fi

          echo "Credential hygiene gate PASSED."

      # ── Annotate PR on failure ────────────────────────────────────────────
      - name: Annotate PR with credential findings
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'REQUEST_CHANGES',
              body: [
                '## 🔴 Credential Gate: FAILED',
                '',
                'This PR contains credential hygiene violations. **Merge is blocked.**',
                '',
                '**What triggered this:**',
                '- A tracked `.env` file, a `user_secret` literal, an HMAC key literal, or a secret value',
                '  in `mcp_config.json` / `claude_code_config.json` was detected in the diff.',
                '',
                '**Required action:**',
                '1. Remove the secret from the commit history (`git rebase` or `git filter-branch`).',
                '2. If a real credential was committed, **rotate it immediately** — git history is public.',
                '3. Add the file to `.gitignore`. Reference values via `os.environ` or Windows Credential Manager.',
                '',
                '> GATE contract never-rule: *"never store user_secret in any file — read from Windows',
                '> Credential Manager only."*',
                '',
                'See the `secrets-scan` job logs for the specific matches.'
              ].join('\n')
            });

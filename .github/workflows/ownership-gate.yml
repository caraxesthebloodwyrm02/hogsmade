name: Ownership Governance Gate

on:
  pull_request:
    branches: [main, hogsmade]

permissions:
  pull-requests: write
  contents: read

jobs:
  ownership-gate:
    name: PR Ownership & Governance Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build shared-types
        run: npm ci -w shared-types && npm run build -w shared-types

      - name: Collect PR metadata
        id: pr_meta
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Get changed files
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              }
            );
            const changedPaths = files.map(f => f.filename);

            // Get approved reviewers
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const approvedReviewers = new Set(
              reviews.data
                .filter(r => r.state === 'APPROVED')
                .map(r => r.user.login)
            );

            const meta = {
              prAuthor: context.payload.pull_request.user.login,
              changedPaths,
              approvedReviewerCount: approvedReviewers.size,
            };

            fs.writeFileSync('pr_meta.json', JSON.stringify(meta, null, 2));
            console.log(`PR author: ${meta.prAuthor}`);
            console.log(`Changed files: ${changedPaths.length}`);
            console.log(`Approved reviewers: ${approvedReviewers.size}`);

      - name: Run governance checks
        id: governance
        run: |
          node --input-type=module <<'SCRIPT'
          import { readFileSync, writeFileSync } from "fs";
          import { OwnershipGovernance } from "./shared-types/dist/security-policy.js";

          const meta = JSON.parse(readFileSync("pr_meta.json", "utf8"));

          // Hardcoded ownership map — future: parse CODEOWNERS
          const ownershipMap = {
            "src/grid/auth/": ["caraxesthebloodwyrm02"],
            "safety/auth/": ["caraxesthebloodwyrm02"],
            "src/application/mothership/security/": ["caraxesthebloodwyrm02"],
            "tests/auth/": ["caraxesthebloodwyrm02"],
            "src/grid/security/": ["caraxesthebloodwyrm02"],
          };

          const results = [
            OwnershipGovernance.checkSensitivePR(
              meta.changedPaths,
              meta.approvedReviewerCount,
            ),
            OwnershipGovernance.checkSoleOwnership(
              meta.changedPaths,
              meta.prAuthor,
              ownershipMap,
            ),
            OwnershipGovernance.checkTestCoverage(meta.changedPaths),
          ];

          writeFileSync("governance_results.json", JSON.stringify(results, null, 2));

          const denied = results.filter((r) => r.verdict === "deny");
          const escalated = results.filter((r) => r.verdict === "escalate");

          console.log(`Results: ${results.length} checks`);
          console.log(`  deny: ${denied.length}, escalate: ${escalated.length}`);

          for (const r of results) {
            console.log(`  [${r.policyId}] ${r.verdict}: ${r.reason}`);
          }

          if (denied.length > 0) {
            process.exit(1);
          }
          SCRIPT

      - name: Annotate PR on deny
        if: failure() && steps.governance.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('governance_results.json', 'utf8'));
            const denied = results.filter(r => r.verdict === 'deny');
            const escalated = results.filter(r => r.verdict === 'escalate');

            let body = '## Ownership Governance Gate\n\n';

            if (denied.length > 0) {
              body += '### Blocked\n\n';
              for (const r of denied) {
                body += `- **${r.policyId}** (${r.threatBasis}): ${r.reason}\n`;
              }
              body += '\n';
            }

            if (escalated.length > 0) {
              body += '### Escalation Advisory\n\n';
              for (const r of escalated) {
                body += `- **${r.policyId}** (${r.threatBasis}): ${r.reason}\n`;
              }
              body += '\n';
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'REQUEST_CHANGES',
              body,
            });

      - name: Annotate PR on escalation (advisory)
        if: success()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('governance_results.json', 'utf8'));
            const escalated = results.filter(r => r.verdict === 'escalate');

            if (escalated.length === 0) return;

            let body = '## Ownership Governance Gate — Advisory\n\n';
            for (const r of escalated) {
              body += `- **${r.policyId}** (${r.threatBasis}): ${r.reason}\n`;
            }
            body += '\n*This is advisory only and does not block merge.*\n';

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'COMMENT',
              body,
            });

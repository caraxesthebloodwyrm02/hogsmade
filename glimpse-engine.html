<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glimpse Dynamic Context Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --canvas-bg: #fafaf8;
      --surface: #ffffff;
      --surface-raised: #f5f5f0;
      --ink: #1a1a1a;
      --ink-muted: #6b7280;
      --ink-faint: #9ca3af;
      --teal-50: #f0fdfa;
      --teal-100: #ccfbf1;
      --teal-200: #99f6e4;
      --teal-400: #2dd4bf;
      --teal-500: #14b8a6;
      --teal-600: #0d9488;
      --teal-700: #0f766e;
      --amber-50: #fffbeb;
      --amber-100: #fef3c7;
      --amber-400: #fbbf24;
      --amber-600: #d97706;
      --rose-50: #fff1f2;
      --rose-500: #f43f5e;
      --emerald-50: #ecfdf5;
      --emerald-500: #10b981;
      --emerald-600: #059669;
      --indigo-50: #eef2ff;
      --indigo-500: #6366f1;
      --purple-50: #faf5ff;
      --purple-500: #8b5cf6;
      --border: #e5e7eb;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.07);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.09);
      --font-heading: "Outfit", system-ui, sans-serif;
      --font-body: "DM Sans", system-ui, sans-serif;
      --radius: 8px;
      --radius-lg: 12px;
      --motion: 0.2s ease;
      --touch-min: 44px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--canvas-bg); color: var(--ink); line-height: 1.6; min-height: 100vh; }
    .app { max-width: 1240px; margin: 0 auto; padding: 1.5rem; }

    .header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .header h1 { font-family: var(--font-heading); font-size: 1.55rem; font-weight: 700; }
    .header h1 span { color: var(--teal-600); }
    .header-meta { font-size: 0.8125rem; color: var(--ink-muted); }
    .header-badge { display: inline-block; font-size: 0.625rem; font-weight: 700; padding: 0.125rem 0.5rem; border-radius: 999px; background: var(--teal-50); color: var(--teal-600); border: 1px solid var(--teal-200); margin-left: 0.5rem; vertical-align: middle; letter-spacing: 0.05em; }

    .phase-bar { display: flex; margin-bottom: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
    .phase-step { flex: 1; padding: 0.8rem 1rem; text-align: center; font-size: 0.8125rem; font-weight: 500; color: var(--ink-faint); border-right: 1px solid var(--border); background: var(--surface); }
    .phase-step:last-child { border-right: none; }
    .phase-step.active { color: var(--teal-700); background: var(--teal-50); font-weight: 600; }
    .phase-step.done { color: var(--emerald-600); background: var(--emerald-50); }
    .step-num { display: inline-flex; width: 20px; height: 20px; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.6875rem; font-weight: 700; margin-right: 0.375rem; background: var(--border); color: var(--ink-muted); }
    .phase-step.active .step-num { background: var(--teal-500); color: #fff; }
    .phase-step.done .step-num { background: var(--emerald-500); color: #fff; }

    .drop-zone { border: 2px dashed var(--border); border-radius: var(--radius-lg); padding: 3rem 2rem; text-align: center; background: var(--surface); transition: all var(--motion); cursor: pointer; box-shadow: var(--shadow-sm); }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--teal-400); background: var(--teal-50); }
    .drop-zone-icon { width: 52px; height: 52px; margin: 0 auto 1rem; background: var(--teal-100); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .drop-zone-icon svg { width: 24px; height: 24px; color: var(--teal-600); }
    .drop-zone h2 { font-family: var(--font-heading); font-size: 1.125rem; font-weight: 600; margin-bottom: 0.4rem; }
    .drop-zone p { color: var(--ink-muted); font-size: 0.9rem; }
    .drop-zone input { display: none; }
    .format-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-top: 0.85rem; }
    .format-tag { font-size: 0.6875rem; font-weight: 600; padding: 0.25rem 0.625rem; border-radius: 999px; background: var(--surface-raised); color: var(--ink-muted); border: 1px solid var(--border); }

    .context-panel, .viz-container, .output-card, .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
    .context-panel, .viz-container, .output-card { margin-bottom: 1.5rem; overflow: hidden; }
    .context-header, .viz-header, .output-card-header { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; padding: 0.95rem 1.25rem; border-bottom: 1px solid var(--border); background: var(--surface-raised); }
    .context-header h3, .viz-header h4, .output-card-header h4 { font-family: var(--font-heading); font-size: 0.95rem; font-weight: 600; }
    .context-body, .output-card-body { padding: 1.2rem; }

    .master-grid, .summary-grid, .author-grid { display: grid; gap: 1rem; }
    .master-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .summary-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-top: 1rem; }
    .author-grid { grid-template-columns: 1.2fr 1fr; }
    .master-card, .summary-card, .rule-preview { padding: 0.95rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); }
    .master-kicker { font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-faint); margin-bottom: 0.45rem; }
    .master-help { font-size: 0.78rem; color: var(--ink-muted); margin-top: 0.55rem; }
    .config-status { font-size: 0.78rem; color: var(--ink-muted); }
    .hint-list, .lens-row, .button-row { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .hint-chip, .lens-pill { display: inline-flex; align-items: center; gap: 0.35rem; border-radius: 999px; padding: 0.35rem 0.7rem; font-size: 0.78rem; border: 1px solid var(--border); background: var(--surface-raised); }
    .lens-pill.primary { background: var(--teal-50); color: var(--teal-700); border-color: var(--teal-200); }
    .lens-pill.secondary { background: var(--amber-50); color: var(--amber-600); border-color: var(--amber-100); }

    .dim-tags { display: flex; flex-wrap: wrap; gap: 0.375rem; }
    .dim-tag { font-size: 0.7rem; padding: 0.25rem 0.5rem; border-radius: 4px; background: var(--surface-raised); color: var(--ink-muted); border: 1px solid var(--border); }
    .dim-tag strong { color: var(--ink); }

    .query-bar { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; align-items: stretch; }
    .query-input, .table-search, .rule-textarea, .cluster-select { width: 100%; padding: 0.75rem 1rem; font-family: var(--font-body); font-size: 0.9375rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--ink); outline: none; }
    .query-input:focus, .table-search:focus, .rule-textarea:focus, .cluster-select:focus { border-color: var(--teal-500); box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1); }
    .rule-textarea { min-height: 170px; resize: vertical; }
    .cluster-select { padding: 0.45rem 0.65rem; font-size: 0.8rem; min-width: 140px; }

    .btn { font-family: var(--font-body); font-size: 0.875rem; font-weight: 600; padding: 0.75rem 1.25rem; border: none; border-radius: var(--radius); cursor: pointer; min-height: var(--touch-min); transition: all var(--motion); display: inline-flex; align-items: center; gap: 0.375rem; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--teal-600); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--teal-700); }
    .btn-ghost { background: transparent; color: var(--ink-muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--surface-raised); color: var(--ink); }
    .btn-sm { font-size: 0.8rem; padding: 0.5rem 0.9rem; min-height: 36px; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
    .stat-card { text-align: center; padding: 0.875rem; }
    .stat-value { font-family: var(--font-heading); font-size: 1.375rem; font-weight: 700; color: var(--teal-600); }
    .stat-label { font-size: 0.6875rem; color: var(--ink-muted); margin-top: 0.125rem; text-transform: uppercase; letter-spacing: 0.03em; }

    .mode-bar { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1.5rem; background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.35rem; }
    .mode-btn { padding: 0.5rem 0.9rem; font-size: 0.8125rem; font-weight: 500; color: var(--ink-muted); background: transparent; border: none; border-radius: 6px; cursor: pointer; transition: background var(--motion), color var(--motion); min-height: 36px; }
    .mode-btn:hover { color: var(--ink); background: var(--surface); }
    .mode-btn:focus-visible { outline: 2px solid var(--teal-500); outline-offset: -2px; }
    .mode-btn.active { color: var(--teal-700); background: var(--surface); font-weight: 600; box-shadow: var(--shadow-sm); }
    .mode-score { font-size: 0.7rem; opacity: 0.7; margin-left: 0.3rem; }

    .viz-body { padding: 1rem; position: relative; min-height: 220px; contain: layout style paint; }
    .viz-body svg { width: 100%; display: block; will-change: contents; }
    .legend { display: flex; flex-wrap: wrap; gap: 0.75rem; padding: 0.75rem 1.25rem; border-top: 1px solid var(--border); background: var(--surface-raised); font-size: 0.6875rem; color: var(--ink-muted); }
    .legend-item { display: flex; align-items: center; gap: 0.375rem; }
    .legend-line { width: 16px; height: 0; border-top: 2px solid; }
    .legend-line.dashed { border-top-style: dashed; }
    .legend-line.dotted { border-top-style: dotted; }

    .output-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    .narrative { font-size: 0.9375rem; line-height: 1.8; }
    .narrative strong { color: var(--teal-700); font-weight: 600; }
    .narrative .hl { background: var(--teal-50); padding: 0.125rem 0.375rem; border-radius: 4px; font-weight: 500; }
    .narrative p + p { margin-top: 0.75rem; }

    .evidence-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .evidence-item { border: 1px solid var(--border); border-radius: var(--radius); padding: 0.8rem; background: linear-gradient(180deg, #fff, #fbfbfa); }
    .evidence-top { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; margin-bottom: 0.25rem; }
    .evidence-item p { color: var(--ink-muted); font-size: 0.8rem; }

    .chart-container { position: relative; width: 100%; height: 260px; }
    .export-bar { display: flex; gap: 0.5rem; justify-content: flex-end; padding: 1rem 0; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    .data-table th { text-align: left; padding: 0.625rem 0.75rem; background: var(--surface-raised); border-bottom: 2px solid var(--border); font-weight: 600; color: var(--ink-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.025em; cursor: pointer; user-select: none; }
    .data-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
    .data-table tr:hover td { background: var(--teal-50); }
    .cell-num { font-variant-numeric: tabular-nums; text-align: right; }

    .node-circle { transition: opacity var(--motion), transform var(--motion); cursor: pointer; will-change: transform; }
    .node-circle:hover { transform: scale(1.12); filter: brightness(0.9); }
    .node-circle:focus { outline: 2px solid var(--teal-500); outline-offset: 2px; }
    .node-label { font-family: var(--font-body); font-size: 10px; fill: var(--ink); text-anchor: middle; pointer-events: none; }
    .lane-label { font-family: var(--font-heading); font-size: 11px; fill: var(--ink-muted); font-weight: 600; text-anchor: end; }
    .cluster-label { font-family: var(--font-heading); font-size: 12px; font-weight: 600; fill: var(--ink-muted); text-anchor: middle; }
    .edge-line { fill: none; }
    .edge-influenced { stroke: var(--teal-500); stroke-width: 2; opacity: 0.65; }
    .edge-shared-era { stroke: var(--amber-400); stroke-width: 1.2; opacity: 0.28; stroke-dasharray: 4 3; }
    .edge-shared-space { stroke: var(--emerald-500); stroke-width: 1.2; opacity: 0.24; stroke-dasharray: 2 2; }
    .edge-shared-domain { stroke: var(--indigo-500); stroke-width: 1.2; opacity: 0.24; }
    .era-band { opacity: 0.06; }
    .era-label { font-family: var(--font-body); font-size: 10px; fill: var(--ink-faint); text-anchor: middle; }
    .timeline-connector { stroke: var(--teal-400); stroke-width: 1.5; fill: none; opacity: 0.45; }
    .cluster-boundary { fill-opacity: 0.05; stroke-width: 1.5; stroke-dasharray: 6 3; }

    .empty-state { text-align: center; padding: 2rem; color: var(--ink-muted); font-size: 0.875rem; }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) { .fade-in, .pulse { animation: none; } .node-circle { transition: none; } }
    .skeleton { background: linear-gradient(90deg, var(--surface-raised) 25%, var(--border) 50%, var(--surface-raised) 75%); background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: var(--radius); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-line { height: 0.875rem; margin-bottom: 0.5rem; }
    .skeleton-block { height: 120px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    @media (max-width: 900px) {
      .output-grid, .author-grid { grid-template-columns: 1fr; }
      .query-bar { flex-direction: column; }
      .header { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 600px) {
      .app { padding: 0.75rem; }
      .phase-bar { flex-wrap: wrap; }
      .phase-step { font-size: 0.75rem; padding: 0.6rem 0.5rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .master-grid { grid-template-columns: 1fr; }
      .mode-bar { gap: 0.25rem; padding: 0.25rem; }
      .mode-btn { padding: 0.4rem 0.6rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>
  <script type="module" src="./glimpse-engine/app.js"></script>
</body>
</html>

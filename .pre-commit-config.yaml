# ============================================================================
# CascadeProjects Pre-Commit Configuration (Minimal)
# ============================================================================
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# ============================================================================

repos:
  # General file quality checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of files
      - id: check-yaml
        name: Check YAML syntax
      - id: check-json
        name: Check JSON syntax
      - id: check-added-large-files
        name: Check for large files
        args: [--maxkb=500]
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: detect-private-key
        name: Detect private keys
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: verify-mcp-inventory
        name: Verify MCP manifest vs mcp_config.json + TS server inventory
        entry: python3 Components/scripts/verify_mcp_inventory.py
        language: system
        pass_filenames: false
        files: ^(mcp_config\.json|mcp_config\.example\.json|mcp_inventory\.manifest\.json|package\.json|Components/scripts/verify_mcp_inventory\.py|Tools/MCPServers/[^/]+/package\.json)$

  # Prettier formatting using local node_modules
  - repo: local
    hooks:
      - id: prettier
        name: Prettier (repo root)
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css]
        exclude: ^Projects/GRID-main/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect hardcoded secrets
        args:
          - "--exclude-files"
          - ".*test.*|.*fixture.*|.*mock.*"
          - "--base64-limit"
          - "4.5"
          - "--hex-limit"
          - "3.0"
        exclude: |
          (?x)^(
            .*\.lock|
            .*\.min\.js|
            .*\.min\.css|
            package-lock\.json|
            GRID-main/.*|
            Projects/GATE/archived/.*|
            Projects/GATE/HANDOFF/deployment_manifest\.json|
            Projects/GATE/harness/src/harness/runner\.py|
            Documentation/docs/security_best_practices_report\.md|
            Components/scripts/verify-security-hardening\.sh
          )$

# ============================================================================
# CONFIGURATION
# ============================================================================
fail_fast: false
minimum_pre_commit_version: "3.0.0"
default_stages: [pre-commit, pre-push]

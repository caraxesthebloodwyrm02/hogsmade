<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' blob:; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:; media-src 'self'"
    />
    <title>glass</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0c;
      }
      #field {
        position: fixed;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="field"></canvas>
    <div
      id="block-host"
      style="position: fixed; inset: 0; pointer-events: none; overflow: hidden"
    ></div>
    <div
      id="similarity-pane"
      style="
        position: fixed;
        right: 0;
        width: 360px;
        height: 100%;
        transform: translateX(100%);
        transition: transform 200ms;
        display: none;
        z-index: 90;
        background: rgba(10, 10, 14, 0.92);
        border-left: 1px solid rgba(200, 184, 154, 0.12);
        overflow-y: auto;
        pointer-events: auto;
      "
    ></div>
    <input
      id="user-input"
      type="text"
      placeholder="say something..."
      autocomplete="off"
      spellcheck="false"
      style="
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        width: 480px;
        height: 36px;
        background: rgba(14, 14, 18, 0.85);
        border: 1px solid rgba(200, 184, 154, 0.15);
        border-radius: 4px;
        color: #e8eef4;
        font-family: &quot;IBM Plex Mono&quot;, &quot;Fira Code&quot;, monospace;
        font-size: 13px;
        padding: 0 12px;
        outline: none;
        z-index: 100;
      "
    />
    <script type="module" src="./index.ts"></script>
  </body>
</html>

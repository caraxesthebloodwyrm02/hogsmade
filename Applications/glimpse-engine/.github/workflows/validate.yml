name: Glimpse Validation

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Configuration & Contract Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          cd glimpse-engine
          npm ci

      - name: Run smoke test
        run: |
          cd glimpse-engine
          node scripts/smoke-test.mjs

      - name: Run CI validation (permissive)
        run: |
          cd glimpse-engine
          node scripts/ci-check.mjs

      - name: Run unit tests
        run: |
          cd glimpse-engine
          npm run test:validators

      - name: Upload drift log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: drift-log
          path: glimpse-engine/.glimpse/drift-log.ndjson
          retention-days: 30

  strict-mode:
    name: Strict Validation
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          cd glimpse-engine
          npm ci

      - name: Run strict CI check
        run: |
          cd glimpse-engine
          node scripts/ci-check.mjs --strict

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          cd glimpse-engine
          npm ci

      - name: Run all tests
        run: |
          cd glimpse-engine
          npm test

      - name: Run demo smoke test
        run: |
          cd glimpse-engine
          timeout 30 npm run demo || true
